version: '3.8'
services:
  tenet-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tenet
      POSTGRES_USER: tenet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  tenet-app:
    build: .
    restart: unless-stopped
    depends_on:
      - tenet-db
    environment:
      NODE_ENV: production
      PORT: 8787
      DATABASE_URL: postgres://tenet:${POSTGRES_PASSWORD}@tenet-db:5432/tenet
      TENET_API_TOKEN: ${TENET_API_TOKEN}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    ports:
      - "8787:8787"
